# project name
spring:
  application:
    name: kael-ai-code-project
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/kael_ai_code_project
    username: root
    password: 1234

# server information
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.kael.kaelaicodeproject.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn


