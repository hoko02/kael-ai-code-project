<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Task Tracker</h1>
        <p>Keep track of your daily tasks and stay organized.</p>
    </header>
    <main>
        <section class="task-form">
            <h2>Add New Task</h2>
            <form id="taskForm">
                <input type="text" id="taskTitle" placeholder="Task title" required>
                <textarea id="taskDescription" placeholder="Task description"></textarea>
                <input type="date" id="taskDueDate" required>
                <select id="taskPriority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <button type="submit">Add Task</button>
            </form>
        </section>
        <section class="task-list">
            <h2>Your Tasks</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="low">Low Priority</button>
                <button class="filter-btn" data-filter="medium">Medium Priority</button>
                <button class="filter-btn" data-filter="high">High Priority</button>
            </div>
            <div id="tasksContainer">
                <!-- Tasks will be dynamically added here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Task Tracker. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
